<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>RASP Weather Viewer - NZ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Leaflet Distortable Image Overlay - renders image to 4 corner points
        L.DistortableImageOverlay = L.Layer.extend({
            initialize: function(url, corners, options) {
                this._url = url;
                this._corners = corners;
                L.setOptions(this, options);
            },
            
            onAdd: function(map) {
                this._map = map;
                
                if (!this._canvas) {
                    this._canvas = L.DomUtil.create('canvas', 'leaflet-image-layer leaflet-zoom-animated');
                    this._canvas.style.willChange = 'transform';
                }
                
                if (this.options.opacity) {
                    this._canvas.style.opacity = this.options.opacity;
                }
                
                this.getPane().appendChild(this._canvas);
                
                this._image = new Image();
                this._image.crossOrigin = '';
                this._image.onload = () => {
                    this._reset();
                };
                this._image.src = this._url;
                
                map.on('zoomanim', this._animateZoom, this);
                map.on('zoomend viewreset moveend resize', this._reset, this);
            },
            
            onRemove: function(map) {
                L.DomUtil.remove(this._canvas);
                map.off('zoomanim', this._animateZoom, this);
                map.off('zoomend viewreset moveend resize', this._reset, this);
            },
            
            setOpacity: function(opacity) {
                this._canvas.style.opacity = opacity;
            },
            
            setUrl: function(url) {
                this._url = url;
                this._image.src = url;
            },
            
            setCorners: function(corners) {
                this._corners = corners;
                this._reset();
            },
            
            _animateZoom: function(e) {
                if (!this._map || !this._canvas || !this._bounds) return;
                
                const scale = this._map.getZoomScale(e.zoom);
                const offset = this._map._latLngBoundsToNewLayerBounds(this._bounds, e.zoom, e.center).min;
                
                L.DomUtil.setTransform(this._canvas, offset, scale);
            },
            
            _reset: function() {
                if (!this._map || !this._image.complete) return;
                
                // Clear any transform from zoom animation
                L.DomUtil.setTransform(this._canvas, L.point(0, 0), 1);
                
                const map = this._map;
                const canvas = this._canvas;
                const ctx = canvas.getContext('2d');
                
                const corners = this._corners;
                const tl = map.latLngToLayerPoint(L.latLng(corners[0]));
                const tr = map.latLngToLayerPoint(L.latLng(corners[1]));
                const br = map.latLngToLayerPoint(L.latLng(corners[2]));
                const bl = map.latLngToLayerPoint(L.latLng(corners[3]));
                
                const minX = Math.min(tl.x, tr.x, br.x, bl.x);
                const maxX = Math.max(tl.x, tr.x, br.x, bl.x);
                const minY = Math.min(tl.y, tr.y, br.y, bl.y);
                const maxY = Math.max(tl.y, tr.y, br.y, bl.y);
                
                const width = Math.ceil(maxX - minX);
                const height = Math.ceil(maxY - minY);
                
                canvas.width = width;
                canvas.height = height;
                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
                
                L.DomUtil.setPosition(canvas, L.point(minX, minY));
                
                // Store bounds for zoom animation - this is the key!
                // Convert pixel bounds back to lat/lng bounds
                const swPoint = L.point(minX, maxY);
                const nePoint = L.point(maxX, minY);
                const sw = map.layerPointToLatLng(swPoint);
                const ne = map.layerPointToLatLng(nePoint);
                this._bounds = L.latLngBounds(sw, ne);
                
                const tlAdj = {x: tl.x - minX, y: tl.y - minY};
                const trAdj = {x: tr.x - minX, y: tr.y - minY};
                const brAdj = {x: br.x - minX, y: br.y - minY};
                const blAdj = {x: bl.x - minX, y: bl.y - minY};
                
                ctx.clearRect(0, 0, width, height);
                
                const img = this._image;
                const w = img.width;
                const h = img.height;
                
                this._drawTriangle(ctx, img,
                    0, 0, w, 0, 0, h,
                    tlAdj.x, tlAdj.y, trAdj.x, trAdj.y, blAdj.x, blAdj.y
                );
                this._drawTriangle(ctx, img,
                    w, 0, w, h, 0, h,
                    trAdj.x, trAdj.y, brAdj.x, brAdj.y, blAdj.x, blAdj.y
                );
            },
            
            _drawTriangle: function(ctx, img, x0, y0, x1, y1, x2, y2, sx0, sy0, sx1, sy1, sx2, sy2) {
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(sx0, sy0);
                ctx.lineTo(sx1, sy1);
                ctx.lineTo(sx2, sy2);
                ctx.closePath();
                ctx.clip();
                
                const denom = x0 * (y2 - y1) - x1 * y2 + x2 * y1 + (x1 - x2) * y0;
                if (Math.abs(denom) < 0.01) {
                    ctx.restore();
                    return;
                }
                
                const m11 = -(y0 * (sx2 - sx1) - y1 * sx2 + y2 * sx1 + (y1 - y2) * sx0) / denom;
                const m12 = (y1 * sy2 + y0 * (sy1 - sy2) - y2 * sy1 + (y2 - y1) * sy0) / denom;
                const m21 = (x0 * (sx2 - sx1) - x1 * sx2 + x2 * sx1 + (x1 - x2) * sx0) / denom;
                const m22 = -(x1 * sy2 + x0 * (sy1 - sy2) - x2 * sy1 + (x2 - x1) * sy0) / denom;
                const dx = (x0 * (y2 * sx1 - y1 * sx2) + y0 * (x1 * sx2 - x2 * sx1) + (x2 * y1 - x1 * y2) * sx0) / denom;
                const dy = (x0 * (y2 * sy1 - y1 * sy2) + y0 * (x1 * sy2 - x2 * sy1) + (x2 * y1 - x1 * y2) * sy0) / denom;
                
                ctx.transform(m11, m12, m21, m22, dx, dy);
                ctx.drawImage(img, 0, 0);
                ctx.restore();
            }
        });
        
        L.distortableImageOverlay = function(url, corners, options) {
            return new L.DistortableImageOverlay(url, corners, options);
        };
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            touch-action: none;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Controls Panel */
        .controls {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(22, 33, 62, 0.95);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 320px;
            max-height: calc(100vh - 20px);
            overflow-y: auto;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .controls.collapsed {
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none;
        }
        .controls h2 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 1.1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .controls-toggle {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1001;
            background: rgba(233, 69, 96, 0.95);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .controls-toggle.active {
            transform: translateX(0);
        }
        .close-controls {
            display: none;
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.5em;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        .close-controls:hover { color: #fff; }
        
        .control-group {
            margin-bottom: 12px;
        }
        .control-group label {
            display: block;
            font-size: 0.75em;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        select {
            width: 100%;
            background: #0f3460;
            color: #fff;
            border: 1px solid #e94560;
            padding: 10px 8px;
            border-radius: 5px;
            font-size: 16px; /* Prevents zoom on iOS */
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }
        select:focus { outline: none; border-color: #fff; }
        select option { background: #16213e; }
        
        .time-slider-container {
            margin-top: 5px;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: #0f3460;
            border-radius: 4px;
            margin: 10px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #e94560;
            border-radius: 50%;
            cursor: pointer;
        }
        .time-display {
            text-align: center;
            font-size: 1.6em;
            color: #e94560;
            font-weight: bold;
        }
        .play-controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .play-btn {
            flex: 1;
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        .play-btn:hover, .play-btn:active { background: #ff6b6b; }
        .speed-select {
            width: 80px;
        }
        .expert-toggle {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #444;
        }
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .toggle-label input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .opacity-control {
            margin-top: 10px;
        }
        .opacity-control input {
            width: 100%;
        }
        #map {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            touch-action: none;
        }
        
        /* Smooth canvas animations */
        .leaflet-image-layer {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }
        
        .leaflet-zoom-animated {
            will-change: transform;
        }
        .info-box {
            position: fixed;
            bottom: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(22, 33, 62, 0.9);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8em;
            color: #aaa;
            max-width: calc(100vw - 20px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .header-box {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: rgba(22, 33, 62, 0.95);
            padding: 6px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: calc(100vw - 80px);
        }
        .header-box img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .legend-box {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: rgba(22, 33, 62, 0.95);
            padding: 6px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: calc(100vw - 20px);
        }
        .legend-box img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .time-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        .time-nav-btn {
            background: #e94560;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .time-nav-btn:hover, .time-nav-btn:active { background: #ff6b6b; }
        .time-nav-btn:disabled { background: #555; cursor: not-allowed; }
        .leaflet-control-attribution { display: none; }
        
        .sounding-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background: rgba(22, 33, 62, 0.98);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.7);
            display: none;
            max-width: calc(100vw - 20px);
            max-height: calc(100vh - 20px);
            overflow: auto;
        }
        .sounding-popup.active {
            display: block;
        }
        .sounding-popup img {
            max-width: 100%;
            max-height: calc(100vh - 80px);
            display: block;
        }
        .sounding-popup .close-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #e94560;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.4em;
        }
        .sounding-popup .close-btn:hover, .sounding-popup .close-btn:active {
            background: #ff6b6b;
        }
        .sounding-popup h3 {
            color: #e94560;
            margin: 0 0 10px 0;
            padding-right: 40px;
            font-size: 1em;
        }
        .sounding-marker {
            background: #e94560;
            border: 2px solid white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        /* Mobile Styles */
        @media (max-width: 768px) {
            .controls {
                top: 0;
                left: 0;
                right: 0;
                max-width: 100%;
                border-radius: 0 0 10px 10px;
                padding: 12px 15px;
                max-height: 70vh;
            }
            .controls.collapsed {
                transform: translateY(-100%);
            }
            .controls-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .controls.collapsed + .controls-toggle {
                transform: translateY(0);
            }
            .close-controls {
                display: block;
            }
            .controls h2 {
                font-size: 1em;
                margin-bottom: 10px;
            }
            .control-group {
                margin-bottom: 10px;
            }
            .control-group label {
                font-size: 0.7em;
            }
            select {
                padding: 10px 8px;
            }
            .header-box {
                top: auto;
                bottom: 70px;
                left: 5px;
                right: 5px;
                transform: none;
                max-width: none;
                padding: 4px;
            }
            .legend-box {
                bottom: 5px;
                left: 5px;
                right: 5px;
                transform: none;
                padding: 6px;
                max-width: none;
            }
            .legend-box img {
                max-height: none;
                width: 100%;
                height: auto;
                min-height: 50px;
            }
            .info-box {
                display: none;
            }
            .time-display {
                font-size: 1.4em;
            }
            .play-controls {
                gap: 6px;
            }
            .time-nav {
                gap: 6px;
            }
            .time-nav-btn {
                width: 40px;
                height: 40px;
            }
            /* Two column layout for dropdowns on mobile */
            .mobile-row {
                display: flex;
                gap: 10px;
            }
            .mobile-row .control-group {
                flex: 1;
                margin-bottom: 8px;
            }
        }
        
        @media (max-width: 480px) {
            .controls {
                padding: 10px 12px;
            }
            .header-box {
                display: none;
            }
            .legend-box img {
                min-height: 45px;
            }
            .sounding-marker {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }
        }
        .sounding-marker:hover {
            background: #ff6b6b;
            transform: scale(1.1);
        }
        
        /* Help Button */
        .help-btn {
            background: #0f3460;
            color: #e94560;
            border: 1px solid #e94560;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            width: 100%;
            margin-top: 10px;
            transition: all 0.2s ease;
        }
        .help-btn:hover {
            background: #e94560;
            color: white;
        }
        
        /* Help Modal */
        .help-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 3000;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .help-modal.active {
            display: flex;
        }
        .help-content {
            background: #16213e;
            border-radius: 10px;
            max-width: 800px;
            max-height: 90vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 30px rgba(0,0,0,0.7);
        }
        .help-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #444;
            background: #0f3460;
        }
        .help-header h2 {
            color: #e94560;
            margin: 0;
            font-size: 1.2em;
        }
        .help-close-btn {
            background: #e94560;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.4em;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .help-close-btn:hover {
            background: #ff6b6b;
        }
        .help-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        .help-text {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.85em;
            line-height: 1.5;
            white-space: pre-wrap;
            color: #ddd;
        }
        .help-text a {
            color: #4ecdc4;
        }
        
        @media (max-width: 768px) {
            .help-content {
                max-height: 95vh;
            }
            .help-body {
                padding: 15px;
            }
            .help-text {
                font-size: 0.75em;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <button class="controls-toggle" id="controlsToggle" aria-label="Open controls">☰</button>
    
    <div class="controls" id="controlsPanel">
        <h2>
            <span>🌤️ RASP NZ</span>
            <button class="close-controls" id="closeControls" aria-label="Close controls">×</button>
        </h2>
        
        <div class="mobile-row">
            <div class="control-group">
                <label>Date</label>
                <select id="dateSelect"></select>
            </div>
            
            <div class="control-group">
                <label>Domain</label>
                <select id="domainSelect"></select>
            </div>
        </div>
        
        <div class="control-group">
            <label>Parameter</label>
            <select id="paramSelect"></select>
        </div>
        
        <div class="control-group">
            <label>Time (Local)</label>
            <div class="time-slider-container">
                <input type="range" id="timeSlider" min="0" max="9" value="4">
                <div class="time-nav">
                    <button class="time-nav-btn" id="timePrev" title="Previous" aria-label="Previous time">◀</button>
                    <div class="time-display" id="timeDisplay" style="flex:1">--:--</div>
                    <button class="time-nav-btn" id="timeNext" title="Next" aria-label="Next time">▶</button>
                </div>
            </div>
        </div>
        
        <div class="play-controls">
            <button class="play-btn" id="playBtn">▶ Play</button>
            <select id="speedSelect" class="speed-select">
                <option value="2000">Slow</option>
                <option value="1000" selected>Normal</option>
                <option value="500">Fast</option>
            </select>
        </div>
        
        <div class="control-group expert-toggle">
            <label class="toggle-label">
                <input type="checkbox" id="expertMode">
                <span>Expert Mode</span>
            </label>
        </div>
        
        <div class="control-group opacity-control">
            <label>Opacity: <span id="opacityValue">70%</span></label>
            <input type="range" id="opacitySlider" min="0" max="100" value="70">
        </div>
        
        <button class="help-btn" id="helpBtn">❓ Parameter Help</button>
    </div>
    
    <div class="info-box" id="infoBox">Loading...</div>
    
    <div class="header-box" id="headerBox">
        <img id="headerImg" src="" alt="Header">
    </div>
    
    <div class="legend-box" id="legendBox">
        <img id="legendImg" src="" alt="Scale">
    </div>
    
    <div class="sounding-popup" id="soundingPopup">
        <button class="close-btn" id="closeSounding">×</button>
        <h3 id="soundingTitle">Sounding</h3>
        <img id="soundingImg" src="" alt="Sounding">
    </div>
    
    <div class="help-modal" id="helpModal">
        <div class="help-content">
            <div class="help-header">
                <h2>📖 RASP Parameter Reference</h2>
                <button class="help-close-btn" id="helpCloseBtn">×</button>
            </div>
            <div class="help-body">
                <pre class="help-text" id="helpText"></pre>
            </div>
        </div>
    </div>
    
    <script>
        // =====================================================
        // EMBEDDED DATA - Generated by static site generator
        // =====================================================
        
        // Parameter descriptions

        // Help modal functionality
        const helpText = "Pleas note this site is in beta stages. I will try and run forcasts every day.\nAny Issues/Bugs/Suggestions please email me: george.downing20@icloud.com.\n\n\n\n================================================================================\n                    RASP (Randomly Accurate Soaring Predictions)\n                              PARAMETER REFERENCE GUIDE\n================================================================================\n\nThis document describes the meteorological parameters available in RASP forecasts,\nprimarily used for soaring flight planning (gliding, paragliding, hang gliding).\n\n================================================================================\n                           THERMAL PARAMETERS\n================================================================================\n\nwstar (Thermal Updraft Velocity)\n    Unit: ft/min\n    The average dry thermal updraft strength near the top of the usable boundary\n    layer. Subtract 200 ft/min to get a more realistic in-flight climb rate.\n    Values < 200 ft/min = weak/no thermals, 400-600 ft/min = moderate, > 800 ft/min = strong.\n\nhbl (BL Top / Thermal Height)\n    Unit: ft AGL\n    Height of the top of the mixing layer (boundary layer). This represents the\n    expected maximum height of dry thermals. NOT the cloudbase height.\n\ndbl (BL Depth)\n    Unit: ft\n    Depth/thickness of the boundary layer. Represents the vertical extent\n    of the convective mixing layer from the surface to the BL top.\n\nhglider (Thermalling Height)\n    Unit: ft AGL\n    Max thermalling height, which is the minimum of the BL top and the\n    overdevelopment cloudbase. This is the practical ceiling for glider pilots.\n\ndglider (Thermalling Depth)\n    Unit: ft\n    The expected depth/thickness of usable thermals for soaring. Calculated as\n    hglider minus the height where thermals become too weak to use.\n\nhwcrit (Critical Height)\n    Unit: ft AGL\n    Height at which the thermal updraft strength falls below a critical threshold\n    (typically 220 ft/min). Useful for determining minimum working altitude.\n\ndwcrit (Critical Depth)\n    Unit: ft\n    Depth of thermals above the critical updraft threshold. The altitude band\n    where thermals are strong enough to be usable for climbing.\n\nbltopvariab (BL Top Variability)\n    Unit: ft\n    Spatial variability of the boundary layer top height. High values indicate\n    inconsistent thermal heights across the region.\n\nwblmaxmin (BL Max/Min W)\n    Unit: ft/min\n    Maximum grid-area-loss updraft strength at BL top. A negative value indicates\n    overall sinking motion. Positive values suggest stronger thermals possible.\n\nzwblmaxmin (Height of BL Max/Min W)\n    Unit: ft AGL\n    Height at which the wblmaxmin value occurs. Useful for understanding the\n    vertical structure of thermals.\n\n================================================================================\n                         THERMAL QUALITY PARAMETERS\n================================================================================\n\nbsratio (Buoyancy/Shear Ratio)\n    Unit: dimensionless\n    Ratio of thermal strength to wind shear. Indicates thermal quality:\n    < 5 = broken/sheared thermals, 5-7 = moderate, > 7 = good organized thermals.\n    Low values mean thermals will be tilted and harder to work.\n\nwstar_bsratio (Combined Thermal Index)\n    Combined display of wstar and bsratio for quick assessment of both thermal\n    strength and quality in one parameter.\n\nsfcshf (Surface Heat Flux)\n    Unit: W/m\u00b2\n    Surface sensible heat flux - the rate at which heat is transferred from the\n    surface to the atmosphere. Higher values indicate stronger thermal generation.\n    Negative values indicate heat transfer to the ground (cooling).\n\nsfcsunpct (Surface Sun Percentage)\n    Unit: %\n    Percentage of full sunshine reaching the surface. Reduced by clouds.\n    100% = clear sky, lower values indicate cloud shadowing.\n\n================================================================================\n                         CLOUD PARAMETERS\n================================================================================\n\nzsfclcl (Surface LCL Height)\n    Unit: ft AGL\n    Lifting Condensation Level based on surface conditions. The height where\n    cumulus clouds would form if air is lifted from the surface.\n\nzsfclclmask (Surface LCL Masked)\n    Unit: ft AGL\n    Same as zsfclcl but masked (not shown) where cumulus are not expected to form.\n\nzsfclcldif (Cu Potential)\n    Unit: ft\n    Difference between the BL top and the surface LCL. Positive values indicate\n    good potential for cumulus cloud formation (Cu overdevelopment possible).\n\nzblcl (BL Cloud Height)\n    Unit: ft AGL\n    Height of cloud base from BL-mean values. More representative of actual\n    cloudbase than surface-based LCL during well-mixed conditions.\n\nzblclmask (BL Cloud Height Masked)\n    Unit: ft AGL\n    Same as zblcl but masked where cumulus clouds are not expected.\n\nzblcldif (BL Cu Potential)\n    Unit: ft\n    BL-based cumulus potential. Positive values indicate cumulus expected.\n\nblcloudpct (BL Cloud Cover)\n    Unit: %\n    Percentage of the sky expected to be covered by cumulus clouds forming\n    at the top of the thermals. High values may indicate overdevelopment.\n\nblicw (BL Integrated Cloud Water)\n    Unit: kg/m\u00b2\n    Integrated cloud water content within the boundary layer. Indicates\n    the total amount of condensed water in BL clouds.\n\nblcwbase (BL Cloud Water Base)\n    Unit: ft AGL\n    Height of the base of clouds containing significant cloud water.\n    Can indicate where actual visible cloudbase will be.\n\ncfracl / wrf=CFRACL (Low Cloud Fraction)\n    Unit: %\n    Fraction of sky covered by low-level clouds (below ~3.5km).\n\ncfracm / wrf=CFRACM (Mid Cloud Fraction)\n    Unit: %\n    Fraction of sky covered by mid-level clouds (~3.5-8km).\n\ncfrach / wrf=CFRACH (High Cloud Fraction)\n    Unit: %\n    Fraction of sky covered by high-level clouds (above ~8km).\n    High cirrus can reduce surface heating and weaken thermals.\n\n================================================================================\n                           WIND PARAMETERS\n================================================================================\n\nsfcwind0 (Surface Wind)\n    Unit: knots\n    Wind speed and direction at the surface (10m AGL). Important for\n    takeoff/landing assessment and ridge soaring potential.\n\nblwind (BL Average Wind)\n    Unit: knots\n    Average wind speed and direction through the boundary layer.\n    Represents the overall wind affecting thermal drift.\n\nbltopwind (BL Top Wind)\n    Unit: knots\n    Wind at the top of the boundary layer. Important for assessing\n    thermal drift at cloudbase and high-altitude conditions.\n\nblwindshear (BL Wind Shear)\n    Unit: knots per 1000ft\n    Vertical wind shear through the boundary layer. High shear tilts\n    thermals and makes them harder to work. Affects thermal quality.\n\n================================================================================\n                         SURFACE PARAMETERS\n================================================================================\n\nsfctemp (Surface Temperature)\n    Unit: \u00b0C\n    Air temperature at 2m above ground level. Important for thermal\n    triggering and pilot comfort.\n\nsfcdewpt (Surface Dew Point)\n    Unit: \u00b0C\n    Dew point temperature at 2m AGL. Indicates moisture content.\n    Closer to sfctemp = higher humidity = lower cloudbase potential.\n\nrain1 (1-hour Precipitation)\n    Unit: inches\n    Accumulated precipitation over the previous hour. Indicates\n    shower/storm activity that will suppress thermal activity.\n\ncape (Convective Available Potential Energy)\n    Unit: J/kg\n    Energy available for convection. High CAPE (>500 J/kg) indicates\n    potential for strong thunderstorm development. Be cautious!\n    0-500 = weak, 500-1500 = moderate, >1500 = strong instability.\n\n================================================================================\n                      PRESSURE LEVEL PARAMETERS\n================================================================================\n\npress950 / press955 (950/955 hPa Level)\n    Conditions at approximately 500m/450m ASL. Shows wind, temperature\n    at low levels above ground.\n\npress850 / press899 / press846 (850 hPa Level)\n    Conditions at approximately 1500m ASL. Standard level for synoptic\n    analysis of lower troposphere.\n\npress795 (795 hPa Level)\n    Conditions at approximately 2000m ASL.\n\npress700 / press701 (700 hPa Level)\n    Conditions at approximately 3000m ASL. Important for mountain flying\n    and assessing mid-level conditions.\n\npress616 / press540 (600-500 hPa Level)\n    Conditions at approximately 4000-5500m ASL. Upper-level analysis.\n\npress500 (500 hPa Level)\n    Conditions at approximately 5500m ASL. Standard level for synoptic\n    analysis of mid-troposphere.\n\n================================================================================\n                         CONVERGENCE PARAMETERS\n================================================================================\n\nwblmaxmin (BL Max Upward/Downward Motion)\n    Unit: ft/min\n    Maximum upward or downward vertical motion within the boundary layer,\n    indicating areas of wind convergence (positive/lifting) or divergence\n    (negative/sinking). Convergence zones can enhance thermal lift and mark\n    areas where thermals are more likely to form or strengthen.\n    Positive values = convergence/lift, negative = divergence/sink.\n\nzwblmaxmin (Height of BL Max W)\n    Unit: ft AGL\n    Height at which the maximum boundary layer vertical motion (wblmaxmin)\n    occurs. Helps understand where in the boundary layer the convergence\n    or divergence is strongest.\n\n================================================================================\n                      CROSS-COUNTRY PERFORMANCE PARAMETERS\n================================================================================\n\npfd_tot (Potential Flight Distance Total)\n    Unit: km\n    Estimated achievable cross-country flight distance based on thermal\n    conditions, averaged over the forecast period. Higher = better soaring day.\n\nxcspeed (Cross-Country Speed)\n    Unit: km/h\n    Expected achievable cross-country speed based on thermal strength and\n    spacing. Accounts for time spent climbing and gliding between thermals.\n    Higher values indicate faster XC potential and better soaring conditions.\n    Is based on a Discus glider polar.\n\nstars (Star Rating)\n    Unit: 0-5 stars\n    Overall soaring quality rating combining thermal strength, height, and \n    conditions. Quick visual indicator of expected soaring conditions:\n    0-1 = poor/unsoarable, 2 = marginal, 3 = moderate, 4 = good, 5 = excellent.\n\n================================================================================\n                         SOUNDING PARAMETERS\n================================================================================\n\nsounding1, sounding2, etc.\n    Atmospheric soundings (skew-T diagrams) at specified locations.\n    Shows vertical profile of temperature, dew point, and wind.\n    Essential for detailed analysis of atmospheric stability.\n\n================================================================================\n                         RIDGE LIFT PARAMETERS\n================================================================================\n\nridgelift (Ridge Lift / Orographic Lift)\n    Unit: ft/min (or cm/s depending on display)\n    Vertical velocity of air at approximately 300ft (100m) above ground level.\n    This is extracted directly from the WRF model's computed vertical velocity\n    field, which accounts for airflow over and around terrain features.\n    \n    Positive values indicate rising air (useful for ridge soaring), while\n    negative values indicate sinking air. Best used in conjunction with\n    surface wind direction to identify ridges that are \"working\".\n    \n    Interpretation:\n    \u2022 > 200 ft/min = Good ridge lift potential\n    \u2022 100-200 ft/min = Marginal ridge lift\n    \u2022 < 100 ft/min = Weak or no ridge lift\n    \u2022 Negative values = Sink / lee side turbulence\n    \n    Note: Actual ridge lift experienced will depend on local terrain features\n    that may be smaller than the model grid resolution (~2km).\n\n================================================================================\n                    EXPERIMENTAL/ADVANCED PARAMETERS\n================================================================================\n\nexperimental1\n    Custom or experimental parameter. Check documentation for specific\n    implementation details.\n\n================================================================================\n                         PARAMETER INTERPRETATION TIPS\n================================================================================\n\nGOOD SOARING CONDITIONS:\n\u2022 wstar > 500 ft/min\n\u2022 hbl > 5000 ft AGL\n\u2022 bsratio > 5\n\u2022 blcloudpct 10-40% (scattered Cu)\n\u2022 Low wind shear\n\u2022 cape < 500 J/kg (avoid thunderstorms)\n\nMARGINAL CONDITIONS:\n\u2022 wstar 200-400 ft/min\n\u2022 bsratio 3-5\n\u2022 High wind shear\n\u2022 Very low or very high cloudbase\n\nPOOR/DANGEROUS CONDITIONS:\n\u2022 wstar < 200 ft/min\n\u2022 bsratio < 3\n\u2022 blcloudpct > 60% (overdevelopment)\n\u2022 cape > 1500 J/kg (thunderstorm risk)\n\u2022 rain1 > 0 in forecast area\n\n================================================================================\n                         UNITS REFERENCE\n================================================================================\n\nIMPLEMENTED UNITS:\n\u2022 Heights: feet (ft) AGL\n\u2022 Vertical Speed: feet/minute (ft/min)\n\u2022 Wind Speed: knots (kt)\n\u2022 Temperature: Celsius (\u00b0C)\n\u2022 Precipitation: inches\n\u2022 Distance: km\n\u2022 Energy: J/kg\n\n================================================================================\n                         ADDITIONAL RESOURCES\n================================================================================\n\nDrJack's RASP Documentation:\nhttp://www.drjack.info/twiki/bin/view/RASPop/RunParametersDescription\n\nRASP Interpretation Guide:\nhttp://www.drjack.info/BLIP/INFO/\n\n================================================================================\n                              END OF DOCUMENT\n================================================================================\n\n\nNote this is AI generated. ";
