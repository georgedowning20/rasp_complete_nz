            height: 100%;
            width: 100%;
            position: fixed;
            touch-action: none;

        #map {

            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;

            z-index: 1;
        }

        .controls {

            top: 10px;
            left: 10px;
            z-index: 1100;
            background: rgba(22, 33, 62, 0.95);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);

            max-height: calc(100vh - 20px);
            overflow-y: auto;

        .controls.small .mobile-row,
        .controls.small .expert-toggle,
        .controls.small .opacity-control,
        .controls.small .play-controls,
        .controls.small .help-btn {
            display: none;
        }
        .controls.small .control-group {
            display: none;
        }
        .controls.small .control-group.time-control {
            display: block;
            margin-bottom: 0;
        }
        .controls.small .control-group.time-control label {

        .controls.small .time-slider-container {

        .controls h2 {

            font-size: 1.1em;
            display: flex;
            justify-content: space-between;

            height: 44px;
            border-radius: 10px;

            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .controls-toggle.active {
            transform: translateX(0);
        }
        .state-indicator {
            font-size: 0.7em;
            color: #aaa;
            margin-top: 2px;
        }
        .close-controls {
            display: none;
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.5em;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        .close-controls:hover { color: #fff; }
        
        .control-group {
            margin-bottom: 12px;
        }
        .control-group label {
            display: block;
            font-size: 0.75em;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        select {
            width: 100%;
            background: #0f3460;
            color: #fff;
            border: 1px solid #e94560;
            padding: 10px 8px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }
        select:focus { outline: none; border-color: #fff; }
        
        .time-slider-container {
            margin-top: 5px;
        }
        input[type="range"] {

            height: 8px;

            background: #0f3460;
            border-radius: 4px;
            margin: 10px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #e94560;
            border-radius: 50%;
            cursor: pointer;
        }
        .time-display {
            text-align: center;
            font-size: 1.6em;
            color: #e94560;
            font-weight: bold;
        }
        .play-controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .play-btn {
            flex: 1;
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        .play-btn:hover, .play-btn:active { background: #ff6b6b; }
        .speed-select {
            width: 80px;
        }
        .expert-toggle {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #444;
        }

            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .toggle-label input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .opacity-control {
            margin-top: 10px;
        }
        .opacity-control input {
            width: 100%;
        }

            bottom: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(22, 33, 62, 0.9);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8em;
            color: #aaa;
            max-width: calc(100vw - 20px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .header-box {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1099;
            background: rgba(22, 33, 62, 0.95);
            padding: 6px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: calc(100vw - 20px);
        }
        .header-box img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        
        .legend-box {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: rgba(22, 33, 62, 0.95);
            padding: 6px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: calc(100vw - 20px);

        .legend-box img {
            display: block;
            max-width: 100%;
            height: auto;
        }

            gap: 8px;
            margin-top: 8px;

            width: 44px;
            height: 44px;

            font-size: 1.3em;
            display: flex;
            align-items: center;
            justify-content: center;

            justify-content: center;
            align-items: center;
            padding: 20px;

        .help-modal.active {
            display: flex;

            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 30px rgba(0,0,0,0.7);

        .help-header {

            justify-content: space-between;

            padding: 15px 20px;

            background: #0f3460;

        .help-header h2 {
            color: #e94560;
            margin: 0;
            font-size: 1.2em;
        }
        .help-close-btn {
            background: #e94560;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;

            font-size: 1.4em;
            display: flex;
            align-items: center;
            justify-content: center;

        .help-close-btn:hover {
            background: #ff6b6b;
        }
        .help-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        .help-text {

            font-size: 0.85em;
            line-height: 1.5;
            white-space: pre-wrap;
            color: #ddd;
        }

            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            padding: 10px;
            border-radius: 10px;

            height: 36px;

            font-size: 1.4em;

                height: auto;

            .info-box {

            .time-display {

        const helpText = "Pleas note this site is in beta stages. I will try and run forcasts every day.\nAny Issues/Bugs/Suggestions please email me: george.downing20@icloud.com.\n\n\n\n================================================================================\n                    RASP (Randomly Accurate Soaring Predictions)\n                              PARAMETER REFERENCE GUIDE\n================================================================================\n\nThis document describes the meteorological parameters available in RASP forecasts,\nprimarily used for soaring flight planning (gliding, paragliding, hang gliding).\n\n================================================================================\n                           THERMAL PARAMETERS\n================================================================================\n\nwstar (Thermal Updraft Velocity)\n    Unit: ft/min\n    The average dry thermal updraft strength near the top of the usable boundary\n    layer. Subtract 200 ft/min to get a more realistic in-flight climb rate.\n    Values < 200 ft/min = weak/no thermals, 400-600 ft/min = moderate, > 800 ft/min = strong.\n\nhbl (BL Top / Thermal Height)\n    Unit: ft AGL\n    Height of the top of the mixing layer (boundary layer). This represents the\n    expected maximum height of dry thermals. NOT the cloudbase height.\n\ndbl (BL Depth)\n    Unit: ft\n    Depth/thickness of the boundary layer. Represents the vertical extent\n    of the convective mixing layer from the surface to the BL top.\n\nhglider (Thermalling Height)\n    Unit: ft AGL\n    Max thermalling height, which is the minimum of the BL top and the\n    overdevelopment cloudbase. This is the practical ceiling for glider pilots.\n\ndglider (Thermalling Depth)\n    Unit: ft\n    The expected depth/thickness of usable thermals for soaring. Calculated as\n    hglider minus the height where thermals become too weak to use.\n\nhwcrit (Critical Height)\n    Unit: ft AGL\n    Height at which the thermal updraft strength falls below a critical threshold\n    (typically 220 ft/min). Useful for determining minimum working altitude.\n\ndwcrit (Critical Depth)\n    Unit: ft\n    Depth of thermals above the critical updraft threshold. The altitude band\n    where thermals are strong enough to be usable for climbing.\n\nbltopvariab (BL Top Variability)\n    Unit: ft\n    Spatial variability of the boundary layer top height. High values indicate\n    inconsistent thermal heights across the region.\n\nwblmaxmin (BL Max/Min W)\n    Unit: ft/min\n    Maximum grid-area-loss updraft strength at BL top. A negative value indicates\n    overall sinking motion. Positive values suggest stronger thermals possible.\n\nzwblmaxmin (Height of BL Max/Min W)\n    Unit: ft AGL\n    Height at which the wblmaxmin value occurs. Useful for understanding the\n    vertical structure of thermals.\n\n================================================================================\n                         THERMAL QUALITY PARAMETERS\n================================================================================\n\nbsratio (Buoyancy/Shear Ratio)\n    Unit: dimensionless\n    Ratio of thermal strength to wind shear. Indicates thermal quality:\n    < 5 = broken/sheared thermals, 5-7 = moderate, > 7 = good organized thermals.\n    Low values mean thermals will be tilted and harder to work.\n\nwstar_bsratio (Combined Thermal Index)\n    Combined display of wstar and bsratio for quick assessment of both thermal\n    strength and quality in one parameter.\n\nsfcshf (Surface Heat Flux)\n    Unit: W/m\u00b2\n    Surface sensible heat flux - the rate at which heat is transferred from the\n    surface to the atmosphere. Higher values indicate stronger thermal generation.\n    Negative values indicate heat transfer to the ground (cooling).\n\nsfcsunpct (Surface Sun Percentage)\n    Unit: %\n    Percentage of full sunshine reaching the surface. Reduced by clouds.\n    100% = clear sky, lower values indicate cloud shadowing.\n\n================================================================================\n                         CLOUD PARAMETERS\n================================================================================\n\nzsfclcl (Surface LCL Height)\n    Unit: ft AGL\n    Lifting Condensation Level based on surface conditions. The height where\n    cumulus clouds would form if air is lifted from the surface.\n\nzsfclclmask (Surface LCL Masked)\n    Unit: ft AGL\n    Same as zsfclcl but masked (not shown) where cumulus are not expected to form.\n\nzsfclcldif (Cu Potential)\n    Unit: ft\n    Difference between the BL top and the surface LCL. Positive values indicate\n    good potential for cumulus cloud formation (Cu overdevelopment possible).\n\nzblcl (BL Cloud Height)\n    Unit: ft AGL\n    Height of cloud base from BL-mean values. More representative of actual\n    cloudbase than surface-based LCL during well-mixed conditions.\n\nzblclmask (BL Cloud Height Masked)\n    Unit: ft AGL\n    Same as zblcl but masked where cumulus clouds are not expected.\n\nzblcldif (BL Cu Potential)\n    Unit: ft\n    BL-based cumulus potential. Positive values indicate cumulus expected.\n\nblcloudpct (BL Cloud Cover)\n    Unit: %\n    Percentage of the sky expected to be covered by cumulus clouds forming\n    at the top of the thermals. High values may indicate overdevelopment.\n\nblicw (BL Integrated Cloud Water)\n    Unit: kg/m\u00b2\n    Integrated cloud water content within the boundary layer. Indicates\n    the total amount of condensed water in BL clouds.\n\nblcwbase (BL Cloud Water Base)\n    Unit: ft AGL\n    Height of the base of clouds containing significant cloud water.\n    Can indicate where actual visible cloudbase will be.\n\ncfracl / wrf=CFRACL (Low Cloud Fraction)\n    Unit: %\n    Fraction of sky covered by low-level clouds (below ~3.5km).\n\ncfracm / wrf=CFRACM (Mid Cloud Fraction)\n    Unit: %\n    Fraction of sky covered by mid-level clouds (~3.5-8km).\n\ncfrach / wrf=CFRACH (High Cloud Fraction)\n    Unit: %\n    Fraction of sky covered by high-level clouds (above ~8km).\n    High cirrus can reduce surface heating and weaken thermals.\n\n================================================================================\n                           WIND PARAMETERS\n================================================================================\n\nsfcwind0 (Surface Wind)\n    Unit: knots\n    Wind speed and direction at the surface (10m AGL). Important for\n    takeoff/landing assessment and ridge soaring potential.\n\nblwind (BL Average Wind)\n    Unit: knots\n    Average wind speed and direction through the boundary layer.\n    Represents the overall wind affecting thermal drift.\n\nbltopwind (BL Top Wind)\n    Unit: knots\n    Wind at the top of the boundary layer. Important for assessing\n    thermal drift at cloudbase and high-altitude conditions.\n\nblwindshear (BL Wind Shear)\n    Unit: knots per 1000ft\n    Vertical wind shear through the boundary layer. High shear tilts\n    thermals and makes them harder to work. Affects thermal quality.\n\n================================================================================\n                         SURFACE PARAMETERS\n================================================================================\n\nsfctemp (Surface Temperature)\n    Unit: \u00b0C\n    Air temperature at 2m above ground level. Important for thermal\n    triggering and pilot comfort.\n\nsfcdewpt (Surface Dew Point)\n    Unit: \u00b0C\n    Dew point temperature at 2m AGL. Indicates moisture content.\n    Closer to sfctemp = higher humidity = lower cloudbase potential.\n\nrain1 (1-hour Precipitation)\n    Unit: inches\n    Accumulated precipitation over the previous hour. Indicates\n    shower/storm activity that will suppress thermal activity.\n\ncape (Convective Available Potential Energy)\n    Unit: J/kg\n    Energy available for convection. High CAPE (>500 J/kg) indicates\n n================================================================================\n                      CROSS-COUNTRY PERFORMANCE PARAMETERS\n================================================================================\n\npfd_tot (Potential Flight Distance Total)\n    Unit: km\n    Estimated achievable cross-country flight distance based on thermal\n    conditions, averaged over the forecast period. Higher = better soaring day.\n\nxcspeed (Cross-Country Speed)\n    Unit: km/h\n    Expected achievable cross-country speed based on thermal strength and\n    spacing. Accounts for time spent climbing and gliding between thermals.\n    Higher values indicate faster XC potential and better soaring conditions.\n    Is based on a Discus glider polar.\n\nstars (Star Rating)\n    Unit: 0-5 stars\n    Overall soaring quality rating combining thermal strength, height, and \n    conditions. Quick visual indicator of expected soaring conditions:\n    0-1 = poor/unsoarable, 2 = marginal, 3 = moderate, 4 = good, 5 = excellent.\n\n================================================================================\n                         SOUNDING PARAMETERS\n================================================================================\n\nsounding1, sounding2, etc.\n    Atmospheric soundings (skew-T diagrams) at specified locations.\n    Shows vertical profile of temperature, dew point, and wind.\n    Essential for detailed analysis of atmospheric stability.\n\n================================================================================\n                         RIDGE LIFT PARAMETERS\n================================================================================\n\nridgelift (Ridge Lift / Orographic Lift)\n    Unit: ft/min (or cm/s depending on display)\n    Vertical velocity of air at approximately 300ft (100m) above ground level.\n    This is extracted directly from the WRF model's computed vertical velocity\n    field, which accounts for airflow over and around terrain features.\n    \n    Positive values indicate rising air (useful for ridge soaring), while\n    negative values indicate sinking air. Best used in conjunction with\n    surface wind direction to identify ridges that are \"working\".\n    \n    Interpretation:\n    \u2022 > 200 ft/min = Good ridge lift potential\n    \u2022 100-200 ft/min = Marginal ridge lift\n    \u2022 < 100 ft/min = Weak or no ridge lift\n    \u2022 Negative values = Sink / lee side turbulence\n    \n    Note: Actual ridge lift experienced will depend on local terrain features\n    that may be smaller than the model grid resolution (~2km).\n\n================================================================================\n                    EXPERIMENTAL/ADVANCED PARAMETERS\n================================================================================\n\nexperimental1\n    Custom or experimental parameter. Check documentation for specific\n    implementation details.\n\n================================================================================\n                         PARAMETER INTERPRETATION TIPS\n================================================================================\n\nGOOD SOARING CONDITIONS:\n\u2022 wstar > 500 ft/min\n\u2022 hbl > 5000 ft AGL\n\u2022 bsratio > 5\n\u2022 blcloudpct 10-40% (scattered Cu)\n\u2022 Low wind shear\n\u2022 cape < 500 J/kg (avoid thunderstorms)\n\nMARGINAL CONDITIONS:\n\u2022 wstar 200-400 ft/min\n\u2022 bsratio 3-5\n\u2022 High wind shear\n\u2022 Very low or very high cloudbase\n\nPOOR/DANGEROUS CONDITIONS:\n\u2022 wstar < 200 ft/min\n\u2022 bsratio < 3\n\u2022 blcloudpct > 60% (overdevelopment)\n\u2022 cape > 1500 J/kg (thunderstorm risk)\n\u2022 rain1 > 0 in forecast area\n\n================================================================================\n                         UNITS REFERENCE\n================================================================================\n\nIMPLEMENTED UNITS:\n\u2022 Heights: feet (ft) AGL\n\u2022 Vertic             // Preserve time index if valid, otherwise keep at same position or max
            if (currentTimeIdx <= parseInt(timeSlider.max)) {
                timeSlider.value = currentTimeIdx;
            } else {
                timeSlider.value = timeSlider.max;
            }
            
            updateTimeDisplay();
            updateImageSource();
            preloadImages(); // Preload all time images for this selection
        }
        
        function updateParameterDropdown() {
            const paramSelect = document.getElementById('paramSelect');
            const currentParam = paramSelect.value;
            paramSelect.innerHTML = '';
            
            let paramsToShow = currentData.parameters;
            if (!expertMode) {
                paramsToShow = currentData.parameters.filter(p => basicParams.includes(p));
            }
            
            paramsToShow.forEach(p => {
                const option = document.createElement('option');
                option.value = p;
                option.textContent = paramInfo[p] || p;
                paramSelect.appendChild(option);
            });
            
            if (paramsToShow.includes(currentParam)) {
                paramSelect.value = currentParam;
            } else if (paramsToShow.length > 0) {
                paramSelect.value = paramsToShow[0];
            }
        }
        
        function updateTimeDisplay() {
            const slider = document.getElementById('timeSlider');
            const display = document.getElementById('timeDisplay');
            const time = currentData.times[slider.value];
            
            if (time) {
                display.textContent = time.substring(0, 2) + ':' + time.substring(2);
            }
        }
        
        function updateOpacity() {
            const slider = document.getElementById('opacitySlider');
            const value = slider.value;
            document.getElementById('opacityValue').textContent = value + '%';
            
            const currentLayerId = `forecast-layer-${activeLayer}`;
            if (map && map.getLayer(currentLayerId)) {
                map.setPaintProperty(currentLayerId, 'raster-opacity', value / 100);
            }
        }
        
        function togglePlay() {
            const btn = document.getElementById('playBtn');
            
            if (isPlaying) {
                isPlaying = false;
                btn.textContent = '▶ Play';
                if (playInterval) {
                    clearInterval(playInterval);
                    playInterval = null;
                }
            } else {
                isPlaying = true;
                btn.textContent = '⏸ Pause';
                
                const speed = parseInt(document.getElementById('speedSelect').value);
                playInterval = setInterval(() => {
                    const slider = document.getElementById('timeSlider');
                    let value = parseInt(slider.value);
                    value = (value + 1) % (parseInt(slider.max) + 1);
                    slider.value = value;
                    updateTimeDisplay();
                    updateImageSource();
                }, speed);
            }
        }
        
        // Event listeners
        document.getElementById('dateSelect').addEventListener('change', (e) => loadDateData(e.target.value));
        document.getElementById('paramSelect').addEventListener('change', () => {
            updateImageSource();
            preloadImages();
        });
        document.getElementById('domainSelect').addEventListener('change', () => {
            updateImageSource();
            preloadImages();
        });
        document.getElementById('styleSelect').addEventListener('change', (e) => {
            console.log('Changing map style to:', e.target.value);
            map.setStyle(e.target.value);
        });
        document.getElementById('expertMode').addEventListener('change', (e) => {
            expertMode = e.target.checked;
            updateParameterDropdown();
            updateImageSource();
            preloadImages();
        });
        document.getElementById('timeSlider').addEventListener('input', () => {
            updateTimeDisplay();
            updateImageSource();
        });
        document.getElementById('opacitySlider').addEventListener('input', updateOpacity);
        document.getElementById('playBtn').addEventListener('click', togglePlay);
        
        document.getElementById('timePrev').addEventListener('click', () => {
            const slider = document.getElementById('timeSlider');
            if (parseInt(slider.value) > 0) {
                slider.value = parseInt(slider.value) - 1;
                updateTimeDisplay();
                updateImageSource();
            }
        });
        document.getElementById('timeNext').addEventListener('click', () => {
            const slider = document.getElementById('timeSlider');
            if (parseInt(slider.value) < parseInt(slider.max)) {
                slider.value = parseInt(slider.value) + 1;
                updateTimeDisplay();
                updateImageSource();
            }
        });
        
        // Mobile controls - three state system
        const controlsPanel = document.getElementById('controlsPanel');
        const controlsToggle = document.getElementById('controlsToggle');
        const closeControls = document.getElementById('closeControls');
        const stateIndicator = document.getElementById('stateIndicator');
        let controlState = 'expanded'; // expanded, small, or away
        
        function updateStateIndicator() {
            stateIndicator.textContent = controlState === 'small' ? 's' : controlState === 'away' ? 'x' : '';
        }
        
        function setControlState(newState) {
            controlState = newState;
            if (newState === 'expanded') {
                controlsPanel.classList.remove('collapsed', 'small');
                controlsToggle.style.display = 'none';
            } else if (newState === 'small') {
                controlsPanel.classList.remove('collapsed');
                controlsPanel.classList.add('small');
                controlsToggle.style.display = 'flex';
            } else {
                controlsPanel.classList.add('collapsed');
                controlsToggle.style.display = 'flex';
            }
            updateStateIndicator();
        }
        
        controlsToggle.addEventListener('click', () => {
            if (controlState === 'away') {
                setControlState('expanded');
            } else if (controlState === 'expanded') {
                setControlState('small');
            } else {
                setControlState('away');
            }
        });
        
        closeControls.addEventListener('click', () => {
            setControlState('away');
        });
        
        document.getElementById('map').addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && controlState === 'expanded') {
                setControlState('small');
            }
        });
        
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                setControlState('expanded');
            }
        });
        
        // Help modal
        document.getElementById('helpText').textContent = helpText;
        
        document.getElementById('helpBtn').addEventListener('click', () => {
            document.getElementById('helpModal').classList.add('active');
        });
        
        document.getElementById('helpCloseBtn').addEventListener('click', () => {
            document.getElementById('helpModal').classList.remove('active');
        });
        
        document.getElementById('helpModal').addEventListener('click', (e) => {
            if (e.target.id === 'helpModal') {
                document.getElementById('helpModal').classList.remove('active');
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('helpModal').classList.remove('active');
                document.getElementById('soundingPopup').classList.remove('active');
                currentSoundingSite = null;
            }
        });
        
        // Close sounding popup
        document.getElementById('closeSounding').addEventListener('click', () => {
            document.getElementById('soundingPopup').classList.remove('active');
            currentSoundingSite = null;
        });
        
        // Initialize
        initMap();
    </script>
</body>
</html>
